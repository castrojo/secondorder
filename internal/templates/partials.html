{{define "head"}}<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TLO</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
.toast-enter { animation: slideIn 0.2s ease-out; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen flex">
{{end}}

{{define "nav"}}
<nav class="w-56 bg-zinc-900 border-r border-zinc-800 flex flex-col fixed h-full">
  <div class="px-4 py-5 border-b border-zinc-800">
    <h1 class="text-sm font-semibold tracking-wide text-zinc-100">TLO</h1>
    <p class="text-xs text-zinc-500 mt-0.5">Agent Orchestration</p>
  </div>
  <div class="flex-1 py-3 px-2 space-y-0.5">
    <a href="/dashboard" class="flex items-center gap-2 px-3 py-1.5 rounded text-sm text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
      Dashboard
    </a>
    <a href="/issues" class="flex items-center gap-2 px-3 py-1.5 rounded text-sm text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Issues
    </a>
    <a href="/work-blocks" class="flex items-center gap-2 px-3 py-1.5 rounded text-sm text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
      Work Blocks
    </a>
    <a href="/agents" class="flex items-center gap-2 px-3 py-1.5 rounded text-sm text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      Agents
    </a>
  </div>
  <div class="px-3 py-3 border-t border-zinc-800">
    <button onclick="togglePalette()" class="w-full flex items-center gap-2 px-3 py-1.5 rounded text-xs text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800 transition-colors">
      <kbd class="px-1 py-0.5 bg-zinc-800 rounded text-[10px]">&#8984;K</kbd> Search
    </button>
  </div>
</nav>
{{end}}

{{define "foot"}}
<!-- Toast container -->
<div id="toasts" class="fixed bottom-4 right-4 z-50 space-y-2 max-w-sm"></div>

<!-- Command palette -->
<div id="palette" class="fixed inset-0 z-50 hidden" onclick="if(event.target===this)togglePalette()">
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
  <div class="relative mx-auto mt-24 w-full max-w-lg bg-zinc-900 rounded-lg border border-zinc-700 shadow-2xl overflow-hidden">
    <input id="palette-input" type="text" placeholder="Search issues and agents..." class="w-full px-4 py-3 bg-transparent text-zinc-100 text-sm outline-none border-b border-zinc-800 placeholder:text-zinc-500" oninput="searchPalette(this.value)" onkeydown="paletteNav(event)">
    <div id="palette-results" class="max-h-72 overflow-y-auto py-1"></div>
  </div>
</div>

<script>
let sse;
function connectSSE() {
  sse = new EventSource('/events');
  sse.addEventListener('comment', e => {
    const d = JSON.parse(e.data);
    showToast(d.author + ' on ' + d.issue_key, d.body.substring(0, 80), '/issues/' + d.issue_key);
  });
  sse.addEventListener('run_complete', e => {
    const d = JSON.parse(e.data);
    showToast('Run ' + d.status, 'Run ' + d.run_id.substring(0, 8) + ' ' + d.status, '/runs/' + d.run_id);
  });
  sse.onerror = () => { sse.close(); setTimeout(connectSSE, 3000); };
}
connectSSE();

function showToast(title, body, href) {
  const el = document.createElement('div');
  el.className = 'toast-enter bg-zinc-800 border border-zinc-700 rounded-lg p-3 shadow-lg cursor-pointer';
  el.innerHTML = '<div class="text-xs font-medium text-zinc-200">' + title + '</div><div class="text-xs text-zinc-400 mt-0.5">' + body + '</div>';
  if (href) el.onclick = () => window.location.href = href;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 5000);
}

function togglePalette() {
  const p = document.getElementById('palette');
  p.classList.toggle('hidden');
  if (!p.classList.contains('hidden')) {
    document.getElementById('palette-input').focus();
    document.getElementById('palette-input').value = '';
    document.getElementById('palette-results').innerHTML = '';
  }
}
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); togglePalette(); }
  if (e.key === 'Escape') document.getElementById('palette').classList.add('hidden');
});

let palIdx = -1;
async function searchPalette(q) {
  palIdx = -1;
  if (!q) { document.getElementById('palette-results').innerHTML = ''; return; }
  const res = await fetch('/search?q=' + encodeURIComponent(q));
  const items = await res.json();
  let html = '';
  (items || []).forEach((it, i) => {
    const icon = it.type === 'issue' ? '&#9633;' : '&#9678;';
    html += '<a href="' + it.url + '" class="pal-item flex items-center gap-2 px-4 py-2 text-sm text-zinc-300 hover:bg-zinc-800" data-idx="' + i + '">' +
      '<span class="text-zinc-500">' + icon + '</span><span class="text-zinc-400 font-mono text-xs">' + it.key + '</span><span>' + it.title + '</span></a>';
  });
  html += '<div class="border-t border-zinc-800 mt-1 pt-1"><a href="/issues" onclick="event.preventDefault();createFromPalette(\'' + q.replace(/'/g, "\\'") + '\')" class="pal-item flex items-center gap-2 px-4 py-2 text-sm text-zinc-400 hover:bg-zinc-800"><span class="text-indigo-400">+</span> Create issue</a></div>';
  document.getElementById('palette-results').innerHTML = html;
}
function createFromPalette(title) {
  const form = document.createElement('form');
  form.method = 'POST'; form.action = '/issues';
  const input = document.createElement('input');
  input.name = 'title'; input.value = title;
  form.appendChild(input); document.body.appendChild(form); form.submit();
}
function paletteNav(e) {
  const items = document.querySelectorAll('.pal-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); palIdx = Math.min(palIdx + 1, items.length - 1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); palIdx = Math.max(palIdx - 1, 0); }
  else if (e.key === 'Enter' && palIdx >= 0) { e.preventDefault(); items[palIdx].click(); return; }
  items.forEach((el, i) => el.classList.toggle('bg-zinc-800', i === palIdx));
}
</script>
</body>
</html>
{{end}}
