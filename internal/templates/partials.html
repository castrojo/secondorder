{{define "head"}}<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Last Org</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }

/* Toast animations */
.toast-enter { animation: toastIn 0.3s cubic-bezier(0.21, 1.02, 0.73, 1) forwards; }
.toast-exit { animation: toastOut 0.2s ease-in forwards; }
@keyframes toastIn { from { transform: translateX(calc(100% + 1rem)); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(calc(100% + 1rem)); opacity: 0; } }

/* Command palette */
.palette-overlay { animation: overlayIn 0.15s ease-out; }
.palette-panel { animation: paletteIn 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes paletteIn { from { opacity: 0; transform: scale(0.95) translateY(-10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

/* Entrance animations */
.fade-in { animation: fadeIn 0.3s ease-out both; }
.slide-up { animation: slideUp 0.3s ease-out both; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Staggered children */
.stagger > * { animation: slideUp 0.3s ease-out both; }
.stagger > *:nth-child(1) { animation-delay: 0ms; }
.stagger > *:nth-child(2) { animation-delay: 30ms; }
.stagger > *:nth-child(3) { animation-delay: 60ms; }
.stagger > *:nth-child(4) { animation-delay: 90ms; }
.stagger > *:nth-child(5) { animation-delay: 120ms; }
.stagger > *:nth-child(n+6) { animation-delay: 150ms; }

/* Details chevron rotation */
details .chev { transition: transform 0.2s ease; }
details[open] .chev { transform: rotate(90deg); }

/* HTMX loading indicator */
.htmx-indicator { display: none; }
.htmx-request .htmx-indicator { display: inline-flex; }
.htmx-request.htmx-indicator { display: inline-flex; }

/* Loading spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 14px; height: 14px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.6s linear infinite; }

/* HTMX swap transitions */
.htmx-settling { opacity: 0; }
.htmx-swapping { opacity: 0; transition: opacity 0.1s ease-out; }
.htmx-added { animation: fadeIn 0.2s ease-out; }

/* Skeleton loading pulse */
.skeleton { background: linear-gradient(90deg, rgb(39 39 42 / 0.5) 25%, rgb(63 63 70 / 0.3) 50%, rgb(39 39 42 / 0.5) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Smooth scrollbar for dark theme */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgb(63 63 70 / 0.5); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgb(82 82 91 / 0.7); }

/* Focus ring */
.focus-ring:focus-visible { outline: none; box-shadow: 0 0 0 2px rgb(24 24 27), 0 0 0 4px rgb(99 102 241 / 0.5); }
</style>
  </head>
  <body class="bg-zinc-950 text-zinc-200 min-h-screen flex">
    {{end}}

    {{define "nav"}}
    <nav
      class="w-56 bg-zinc-900 border-r border-zinc-800 flex flex-col fixed h-full">
      <div class="px-4 py-5 border-b border-zinc-800">
        <h1 class="text-sm font-semibold tracking-wide text-zinc-100">The Last
          Org</h1>
        <p class="text-xs text-zinc-500 mt-0.5">L5 Agent</p>
      </div>
      <div class="flex-1 py-3 px-2 space-y-0.5">
        <a href="/dashboard"
          class="flex items-center gap-2 px-3 py-1.5 rounded text-sm text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor"
            viewBox="0 0 24 24"><path stroke-linecap="round"
              stroke-linejoin="round" stroke-width="1.5"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4" /></svg>
          Dashboard
        </a>
        <a href="/issues"
          class="flex items-center gap-2 px-3 py-1.5 rounded text-sm text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor"
            viewBox="0 0 24 24"><path stroke-linecap="round"
              stroke-linejoin="round" stroke-width="1.5"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
          Issues
        </a>
        <a href="/work-blocks"
          class="flex items-center gap-2 px-3 py-1.5 rounded text-sm text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor"
            viewBox="0 0 24 24"><path stroke-linecap="round"
              stroke-linejoin="round" stroke-width="1.5"
              d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>
          Work Blocks
        </a>
        <a href="/agents"
          class="flex items-center gap-2 px-3 py-1.5 rounded text-sm text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor"
            viewBox="0 0 24 24"><path stroke-linecap="round"
              stroke-linejoin="round" stroke-width="1.5"
              d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
          Agents
        </a>
      </div>
      <div class="px-3 py-3 border-t border-zinc-800">
        <button onclick="togglePalette()"
          class="w-full flex items-center gap-2 px-3 py-1.5 rounded text-xs text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800 active:scale-[0.97] transition-all">
          <kbd
            class="px-1 py-0.5 bg-zinc-800 rounded text-[10px]">&#8984;K</kbd>
          Search
        </button>
      </div>
    </nav>
    {{end}}

    {{define "foot"}}
    <!-- Toast container -->
    <div id="toasts"
      class="fixed bottom-4 right-4 z-50 space-y-2 max-w-sm"></div>

    <!-- Command palette -->
    <div id="palette" class="fixed inset-0 z-50 hidden"
      onclick="if(event.target===this)closePalette()">
      <div id="palette-overlay" class="absolute inset-0 bg-black/60 backdrop-blur-sm palette-overlay"></div>
      <div id="palette-panel"
        class="palette-panel relative mx-auto mt-24 w-full max-w-lg bg-zinc-900 rounded-lg border border-zinc-700 shadow-2xl overflow-hidden">
        <input id="palette-input" type="text"
          placeholder="Search issues and agents..."
          class="w-full px-4 py-3 bg-transparent text-zinc-100 text-sm outline-none border-b border-zinc-800 placeholder:text-zinc-500 focus-ring"
          oninput="searchPalette(this.value)" onkeydown="paletteNav(event)">
        <div id="palette-results" class="max-h-72 overflow-y-auto py-1"></div>
      </div>
    </div>

    <script>
/* HTML escape helper */
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* SSE connection */
let sse;
function connectSSE() {
  sse = new EventSource('/events');
  sse.addEventListener('comment', e => {
    const d = JSON.parse(e.data);
    showToast(d.author + ' on ' + d.issue_key, d.body.substring(0, 80), '/issues/' + d.issue_key);
  });
  sse.addEventListener('run_complete', e => {
    const d = JSON.parse(e.data);
    showToast('Run ' + d.status, 'Run ' + d.run_id.substring(0, 8) + ' ' + d.status, '/runs/' + d.run_id);
  });
  sse.onerror = () => { sse.close(); setTimeout(connectSSE, 3000); };
}
connectSSE();

/* Toast with slide-out dismiss */
function showToast(title, body, href) {
  const el = document.createElement('div');
  el.className = 'toast-enter bg-zinc-800 border border-zinc-700 rounded-lg p-3 shadow-lg cursor-pointer hover:bg-zinc-750 transition-colors';
  el.innerHTML = '<div class="flex items-start justify-between gap-2"><div><div class="text-xs font-medium text-zinc-200"></div><div class="text-xs text-zinc-400 mt-0.5"></div></div>' +
    '<button class="text-zinc-600 hover:text-zinc-400 transition-colors text-sm leading-none mt-0.5" onclick="event.stopPropagation();dismissToast(this.closest(\'[class*=toast]\'))">&times;</button></div>' +
    '<div class="toast-progress mt-2 h-px bg-zinc-700 rounded-full overflow-hidden"><div style="animation:shrink 5s linear forwards" class="h-full bg-indigo-500/50"></div></div>';
  el.querySelector('.text-zinc-200').textContent = title;
  el.querySelector('.text-zinc-400').textContent = body;
  if (href) el.onclick = () => window.location.href = href;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => dismissToast(el), 5000);
}
function dismissToast(el) {
  if (!el || !el.parentNode) return;
  el.classList.remove('toast-enter');
  el.classList.add('toast-exit');
  el.addEventListener('animationend', () => el.remove(), { once: true });
}

/* Command palette */
function openPalette() {
  const p = document.getElementById('palette');
  p.classList.remove('hidden');
  document.getElementById('palette-input').focus();
  document.getElementById('palette-input').value = '';
  document.getElementById('palette-results').innerHTML = '';
}
function closePalette() {
  const p = document.getElementById('palette');
  if (p.classList.contains('hidden')) return;
  const panel = document.getElementById('palette-panel');
  panel.style.animation = 'none';
  panel.offsetHeight;
  panel.style.animation = 'paletteIn 0.15s ease-in reverse forwards';
  panel.addEventListener('animationend', () => {
    p.classList.add('hidden');
    panel.style.animation = '';
  }, { once: true });
}
function togglePalette() {
  document.getElementById('palette').classList.contains('hidden') ? openPalette() : closePalette();
}
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); togglePalette(); }
  if (e.key === 'Escape') closePalette();
});

let palIdx = -1;
async function searchPalette(q) {
  palIdx = -1;
  if (!q) { document.getElementById('palette-results').innerHTML = ''; return; }
  const res = await fetch('/search?q=' + encodeURIComponent(q));
  const items = await res.json();
  let html = '';
  (items || []).forEach((it, i) => {
    const icon = it.type === 'issue' ? '&#9633;' : '&#9678;';
    html += '<a href="' + escapeHtml(it.url) + '" class="pal-item flex items-center gap-2 px-4 py-2 text-sm text-zinc-300 hover:bg-zinc-800 rounded-md mx-1 transition-colors" data-idx="' + i + '">' +
      '<span class="text-zinc-500">' + icon + '</span><span class="text-zinc-400 font-mono text-xs">' + escapeHtml(it.key) + '</span><span>' + escapeHtml(it.title) + '</span></a>';
  });
  html += '<div class="border-t border-zinc-800 mt-1 pt-1"><a href="/issues" data-create-title="" class="pal-item flex items-center gap-2 px-4 py-2 text-sm text-zinc-400 hover:bg-zinc-800 rounded-md mx-1 transition-colors"><span class="text-indigo-400">+</span> Create issue</a></div>';
  const container = document.getElementById('palette-results');
  container.innerHTML = html;
  const createLink = container.querySelector('[data-create-title]');
  if (createLink) {
    createLink.dataset.createTitle = q;
    createLink.addEventListener('click', function(e) { e.preventDefault(); createFromPalette(this.dataset.createTitle); });
  }
}
function createFromPalette(title) {
  const form = document.createElement('form');
  form.method = 'POST'; form.action = '/issues';
  const input = document.createElement('input');
  input.name = 'title'; input.value = title;
  form.appendChild(input); document.body.appendChild(form); form.submit();
}
function paletteNav(e) {
  const items = document.querySelectorAll('.pal-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); palIdx = Math.min(palIdx + 1, items.length - 1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); palIdx = Math.max(palIdx - 1, 0); }
  else if (e.key === 'Enter' && palIdx >= 0) { e.preventDefault(); items[palIdx].click(); return; }
  items.forEach((el, i) => {
    el.classList.toggle('bg-zinc-800', i === palIdx);
    el.classList.toggle('text-zinc-100', i === palIdx);
  });
  if (palIdx >= 0) items[palIdx].scrollIntoView({ block: 'nearest' });
}

/* HTMX loading indicators */
document.addEventListener('htmx:beforeRequest', function(e) {
  const indicator = e.target.querySelector('.htmx-indicator');
  if (indicator) indicator.style.display = 'inline-flex';
});
document.addEventListener('htmx:afterRequest', function(e) {
  const indicator = e.target.querySelector('.htmx-indicator');
  if (indicator) indicator.style.display = 'none';
});

/* Auto-scroll stdout container on HTMX swap */
document.addEventListener('htmx:afterSwap', function(e) {
  if (e.target.id === 'stdout-container') {
    const el = e.target;
    const isNearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 100;
    if (isNearBottom) el.scrollTop = el.scrollHeight;
  }
});

/* Toast progress bar shrink animation (injected dynamically) */
if (!document.getElementById('toast-progress-style')) {
  const s = document.createElement('style');
  s.id = 'toast-progress-style';
  s.textContent = '@keyframes shrink { from { width: 100%; } to { width: 0%; } }';
  document.head.appendChild(s);
}
</script>
  </body>
</html>
{{end}}
