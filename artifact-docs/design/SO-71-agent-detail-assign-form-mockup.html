<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Detail - Mockup SO-71</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #09090b;
            --sf: #18181b;
            --bd: #27272a;
            --ink: #f4f4f5;
            --ink2: #e4e4e7;
            --ink3: #a1a1aa;
            --ac: #4f46e5;
            --ac-h: #4338ca;
        }
        body { background: var(--bg); color: var(--ink); font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif; }
        .bg-card { background: var(--sf); }
        .border-bd { border-color: var(--bd); }
        .text-ink { color: var(--ink); }
        .text-ink2 { color: var(--ink2); }
        .text-ink3 { color: var(--ink3); }
        .bg-ac { background: var(--ac); }
        .bg-ac-h { background: var(--ac-h); }
        .bg-sf { background: var(--sf); }
        .divide-sf > * + * { border-color: var(--sf); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-2xl mx-auto space-y-8">
        
        <div>
            <h2 class="text-sm font-semibold text-ink3 mb-4 uppercase tracking-wider">Example 1: Empty Inbox (Always Show Form)</h2>
            <div class="space-y-6 bg-[#0c0c0e] p-6 rounded-xl border border-bd">
                <!-- Header -->
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg bg-sf border border-bd flex items-center justify-center text-sm font-semibold text-indigo-400 uppercase">JD</div>
                    <div>
                        <div class="flex items-center gap-2.5">
                            <h1 class="text-lg font-semibold text-ink">John Doe</h1>
                            <span class="px-2 py-0.5 rounded text-[10px] bg-sf text-ink3">engineer</span>
                            <div class="w-2 h-2 rounded-full bg-emerald-400"></div>
                        </div>
                    </div>
                </div>

                <!-- Usage Grid -->
                <div class="grid grid-cols-4 gap-3">
                    <div class="bg-card border border-bd rounded-lg p-3">
                        <div class="text-[10px] text-ink3/50 uppercase tracking-wider">Today Cost</div>
                        <div class="text-md font-semibold text-ink mt-1">$0.42</div>
                    </div>
                    <div class="bg-card border border-bd rounded-lg p-3">
                        <div class="text-[10px] text-ink3/50 uppercase tracking-wider">Total Cost</div>
                        <div class="text-md font-semibold text-ink mt-1">$12.80</div>
                    </div>
                    <!-- Other stats... -->
                </div>

                <!-- Assign Form (PERSISTENT) -->
                <div class="space-y-2">
                    <label class="text-[11px] font-medium text-ink3 uppercase tracking-wider">Assign Work</label>
                    <form class="flex items-center gap-2">
                        <select class="flex-1 bg-sf border border-bd rounded-md px-3 py-1.5 text-xs text-ink outline-none focus:ring-1 focus:ring-ac">
                            <option>Assign an issue...</option>
                            <option>SO-101: Fix bug in checkout (assigned to Alice)</option>
                            <option>SO-102: Implement new auth flow</option>
                            <option>SO-103: Update documentation</option>
                        </select>
                        <button type="button" class="px-3 py-1.5 rounded-md text-xs font-medium bg-ac text-white hover:bg-ac-h transition-colors">Assign</button>
                    </form>
                </div>

                <!-- Inbox -->
                <div>
                    <h3 class="text-[13px] font-medium text-ink2 mb-2">Inbox</h3>
                    <div class="bg-card border border-bd rounded-lg divide-y divide-[#202023] overflow-hidden">
                        <div class="px-4 py-8 text-center text-ink3/50 text-xs italic">
                            No issues assigned to this agent's inbox.
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <hr class="border-bd">

        <div>
            <h2 class="text-sm font-semibold text-ink3 mb-4 uppercase tracking-wider">Example 2: Populated Inbox</h2>
            <div class="space-y-6 bg-[#0c0c0e] p-6 rounded-xl border border-bd opacity-50">
                <!-- Assign Form -->
                <div class="space-y-2">
                    <label class="text-[11px] font-medium text-ink3 uppercase tracking-wider">Assign Work</label>
                    <form class="flex items-center gap-2">
                        <select class="flex-1 bg-sf border border-bd rounded-md px-3 py-1.5 text-xs text-ink outline-none">
                            <option>Assign an issue...</option>
                        </select>
                        <button type="button" class="px-3 py-1.5 rounded-md text-xs font-medium bg-ac text-white">Assign</button>
                    </form>
                </div>

                <!-- Inbox -->
                <div>
                    <h3 class="text-[13px] font-medium text-ink2 mb-2">Inbox</h3>
                    <div class="bg-card border border-bd rounded-lg divide-y divide-[#202023] overflow-hidden">
                        <div class="flex items-center gap-3 px-4 py-2.5 hover:bg-zinc-800/40 transition-colors">
                            <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[10px] font-medium bg-emerald-500/10 text-emerald-400">TODO</span>
                            <span class="font-mono text-xs text-ink3/50 w-14 shrink-0">SO-71</span>
                            <span class="text-[13px] text-ink flex-1 truncate">Always show assign form on agent detail</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
