<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SO-76: Empty States Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-pg: 249 248 243; --c-card: 255 255 255; --c-sf: 241 239 238; --c-bd: 223 223 221;
            --c-ink: 20 18 17; --c-ink2: 51 49 47; --c-ink3: 48 47 45;
            --c-ac: 122 223 156; --c-ac-h: 107 207 140; --c-ac-t: 0 159 96;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --c-pg: 9 9 11; --c-card: 24 24 27; --c-sf: 39 39 42; --c-bd: 39 39 42;
                --c-ink: 228 228 231; --c-ink2: 212 212 216; --c-ink3: 161 161 170;
                --c-ac: 79 70 229; --c-ac-h: 99 102 241; --c-ac-t: 129 140 248;
            }
        }
        body { font-family: 'Inter', sans-serif; background-color: rgb(var(--c-pg)); color: rgb(var(--c-ink)); }
        .bg-card { background-color: rgb(var(--c-card)); }
        .bg-sf { background-color: rgb(var(--c-sf)); }
        .border-bd { border-color: rgb(var(--c-bd)); }
        .text-ink2 { color: rgb(var(--c-ink2)); }
        .text-ink3 { color: rgb(var(--c-ink3)); }
        .text-ac-t { color: rgb(var(--c-ac-t)); }
        .bg-ac { background-color: rgb(var(--c-ac)); }
        .bg-bd { background-color: rgb(var(--c-bd)); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-2xl mx-auto space-y-12">
        <header>
            <h1 class="text-xl font-bold mb-2">SO-76: Issue Detail Empty States</h1>
            <p class="text-sm text-ink3/60">Mockup for Sub-issues and Runs empty states</p>
        </header>

        <!-- Sub-issues Section -->
        <section>
            <h3 class="text-[13px] font-medium text-ink2 mb-3">Sub-issues</h3>
            
            <div id="sub-issues-empty" class="bg-sf/30 border border-bd border-dashed rounded-lg p-10 flex flex-col items-center justify-center text-center group hover:border-ac/30 transition-colors">
                <div class="w-10 h-10 rounded-full bg-sf flex items-center justify-center mb-4 group-hover:bg-ac/10 transition-colors">
                    <svg class="w-5 h-5 text-ink3/40 group-hover:text-ac-t transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                </div>
                <h4 class="text-[14px] font-semibold text-ink2 mb-1">No sub-issues yet</h4>
                <p class="text-xs text-ink3/50 max-w-[240px] mb-6">Break this issue down into smaller, actionable tasks for better focus.</p>
                <button onclick="showSubIssueForm()" class="inline-flex items-center gap-2 px-4 py-2 bg-bd hover:bg-ink3/40 text-ink text-xs font-medium rounded-md transition-all active:scale-[0.97]">
                    Add sub-issue
                </button>
            </div>

            <!-- Inline form (hidden by default) -->
            <div id="sub-issue-form" class="hidden bg-card border border-bd rounded-lg p-4 space-y-4 shadow-sm animate-fade-in">
                <div class="space-y-3">
                    <input type="text" placeholder="What needs to be done?" class="w-full bg-sf border border-bd rounded-md px-3 py-2 text-sm text-ink placeholder-ink3/30 outline-none focus:ring-1 focus:ring-ac transition-shadow" autofocus>
                    <div class="flex items-center gap-3">
                        <select class="flex-1 bg-sf border border-bd rounded-md px-3 py-1.5 text-xs text-ink outline-none focus:ring-1 focus:ring-ac">
                            <option value="task">Task</option>
                            <option value="api">API</option>
                            <option value="backend">Backend</option>
                            <option value="frontend">Frontend</option>
                            <option value="bug">Bug</option>
                        </select>
                        <select class="flex-1 bg-sf border border-bd rounded-md px-3 py-1.5 text-xs text-ink outline-none focus:ring-1 focus:ring-ac">
                            <option value="0">Priority: None</option>
                            <option value="1">Low</option>
                            <option value="2">Medium</option>
                            <option value="3">High</option>
                            <option value="4">Urgent</option>
                        </select>
                    </div>
                </div>
                <div class="flex justify-end gap-2 pt-1">
                    <button onclick="hideSubIssueForm()" class="px-3 py-1.5 text-xs font-medium text-ink3/60 hover:text-ink transition-colors">Cancel</button>
                    <button class="px-4 py-1.5 bg-ac text-pg text-xs font-semibold rounded-md hover:bg-ac-h transition-all">Create Issue</button>
                </div>
            </div>
        </section>

        <!-- Runs Section -->
        <section>
            <h3 class="text-[13px] font-medium text-ink2 mb-3">Runs</h3>
            
            <div class="bg-sf/30 border border-bd border-dashed rounded-lg p-10 flex flex-col items-center justify-center text-center">
                <div class="w-10 h-10 rounded-full bg-sf flex items-center justify-center mb-4">
                    <svg class="w-5 h-5 text-ink3/40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                    </svg>
                </div>
                <h4 class="text-[14px] font-semibold text-ink2 mb-1">No runs recorded</h4>
                <p class="text-xs text-ink3/50 max-w-[240px]">Runs will appear here when an agent starts working on this issue.</p>
            </div>
        </section>

    </div>

    <script>
        function showSubIssueForm() {
            document.getElementById('sub-issues-empty').classList.add('hidden');
            document.getElementById('sub-issue-form').classList.remove('hidden');
        }
        function hideSubIssueForm() {
            document.getElementById('sub-issues-empty').classList.remove('hidden');
            document.getElementById('sub-issue-form').classList.add('hidden');
        }
    </script>
</body>
</html>
